<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exec News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f19;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: #111827;
}

.sub {
  text-align: center;
  opacity: 0.7;
  margin-top: -10px;
  margin-bottom: 20px;
}

.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  gap: 20px;
  padding: 20px;
}

.sidebar {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  height: fit-content;
}

button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #374151;
}

.news {
  display: grid;
  gap: 12px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  border-left: 4px solid #3b82f6;
}

a {
  color: #60a5fa;
  text-decoration: none;
}

.meta {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>Exec News</header>
<div class="sub">Real-time executive intelligence feed</div>

<div class="container">

  <div class="sidebar">
    <button onclick="loadNews('business')">Business</button>
    <button onclick="loadNews('technology')">Technology</button>
    <button onclick="loadNews('markets')">Markets</button>
    <button onclick="loadNews('world')">World</button>
    <button onclick="loadNews('crypto')">Crypto</button>
  </div>

  <div class="news" id="news"></div>

</div>

<script>
const API = "https://api.rss2json.com/v1/api.json?rss_url=";

const feeds = {
  business: "https://feeds.bbci.co.uk/news/business/rss.xml",
  technology: "https://feeds.bbci.co.uk/news/technology/rss.xml",
  world: "https://feeds.bbci.co.uk/news/world/rss.xml",
  markets: "https://www.cnbc.com/id/100003114/device/rss/rss.html",
  crypto: "https://cointelegraph.com/rss"
};

async function loadNews(type="business") {
  const url = API + encodeURIComponent(feeds[type]);
  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.items.slice(0, 12).forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <a href="${item.link}" target="_blank">${item.title}</a>
      <div class="meta">${item.pubDate}</div>
    `;
    container.appendChild(div);
  });
}

// auto refresh every 60 seconds
loadNews("business");
setInterval(() => loadNews("business"), 60000);
</script>

</body>
</html>
