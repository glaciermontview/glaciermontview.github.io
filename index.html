<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="dark"/>
<title>Exec News</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:#fff;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #2a2a2a;
position:sticky;
top:0;
background:#0f0f0f;
}

.logo{
font-weight:800;
letter-spacing:3px;
}

#clock{
color:#aaa;
}

.ticker{
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #2a2a2a;
background:#141414;
padding:10px;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#171717;
padding:15px;
border:1px solid #2a2a2a;
border-radius:12px;
}

h2{
margin-top:0;
}

.market{
font-size:14px;
color:#aaa;
line-height:1.8;
}

.green{color:#3efc7a;}
.red{color:#ff4d4d;}

.briefing{
font-size:18px;
color:#ddd;
min-height:40px;
}

.full{
grid-column:span 2;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #2a2a2a;
color:#777;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">EXEC NEWS</div>
<div id="clock"></div>
</header>

<div class="ticker">
<span id="ticker"></span>
</div>

<div class="container">

<div class="card">
<h2>Executive Briefing</h2>
<div class="briefing" id="briefing"></div>
</div>

<div class="card">
<h2>Markets</h2>
<div class="market" id="markets"></div>
</div>

<div class="card full">
<h2>Live Headlines</h2>
<div id="headlines"></div>
</div>

</div>

<footer>
Exec News • One Page Executive Intelligence Dashboard
</footer>

<script>
// CLOCK
function updateClock(){
document.getElementById("clock").textContent =
new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// TICKER
const tickerItems=[
"Markets steady",
"AI sector rising",
"Energy prices shifting",
"Tech earnings ahead",
"Global policy updates",
"Interest rates monitored"
];

document.getElementById("ticker").textContent =
tickerItems.join(" • ");

// BRIEFING ROTATION
const briefings=[
"Global markets show mixed momentum.",
"AI infrastructure continues rapid expansion.",
"Corporate earnings season approaches.",
"Investors monitor inflation signals.",
"Technology sector leads innovation cycle."
];

let b=0;
function rotateBriefing(){
document.getElementById("briefing").textContent=briefings[b];
b=(b+1)%briefings.length;
}
setInterval(rotateBriefing,4000);
rotateBriefing();

// MARKET SIMULATION
let stocks=[
{n:"S&P 500",v:4800},
{n:"NASDAQ",v:15000},
{n:"DOW",v:38000}
];

function updateMarkets(){
document.getElementById("markets").innerHTML =
stocks.map(s=>{
let change=(Math.random()*40-20).toFixed(2);
s.v+=parseFloat(change);

let cls=s.v%2==0?"green":"red";

return `
${s.n}: <span class="${cls}">${s.v.toFixed(2)} (${change})</span><br>
`;
}).join("");
}

setInterval(updateMarkets,2000);
updateMarkets();

// HEADLINES
const headlines=[
"Federal Reserve signals cautious outlook.",
"Tech giants report strong AI revenue growth.",
"Oil markets stabilize after volatility.",
"Global trade negotiations continue.",
"Cybersecurity threats increase worldwide.",
"Startup funding rebounds in key sectors."
];

let h=0;
function rotateHeadlines(){
let container=document.getElementById("headlines");
container.innerHTML+=headlines[h]+"<br>";
h=(h+1)%headlines.length;
if(container.innerHTML.split("<br>").length>6){
container.innerHTML="";
}
}
setInterval(rotateHeadlines,2500);
rotateHeadlines();

</script>

</body>
</html>
