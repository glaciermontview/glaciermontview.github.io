<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exec News</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f17;
        color: #e6edf3;
    }

    header {
        padding: 20px;
        background: #111827;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid #222;
    }

    h1 {
        margin: 0;
        font-size: 20px;
    }

    input {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #1f2937;
        color: white;
    }

    .container {
        padding: 20px;
        display: grid;
        gap: 15px;
    }

    .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 15px;
        transition: 0.2s;
    }

    .card:hover {
        transform: scale(1.01);
        border-color: #3b82f6;
    }

    .title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .meta {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 8px;
    }

    a {
        color: #60a5fa;
        text-decoration: none;
    }

    .tag {
        display: inline-block;
        font-size: 11px;
        background: #1f2937;
        padding: 3px 8px;
        border-radius: 20px;
        margin-right: 5px;
        margin-top: 5px;
    }

</style>
</head>

<body>

<header>
    <h1>Exec News Dashboard</h1>
    <input id="search" placeholder="Filter: CEO, CFO, merger, resignation..." />
</header>

<div class="container" id="news"></div>

<script>
const FEED_URL = "https://api.rss2json.com/v1/api.json?rss_url=" +
encodeURIComponent("https://news.google.com/rss/search?q=executive+CEO+CFO+resignation+merger+when:7d&hl=en-US&gl=US&ceid=US:en");

let allItems = [];

async function loadNews() {
    try {
        const res = await fetch(FEED_URL);
        const data = await res.json();

        allItems = data.items || [];
        render(allItems);
    } catch (e) {
        document.getElementById("news").innerHTML =
            "<p>Failed to load news feed.</p>";
    }
}

function render(items) {
    const container = document.getElementById("news");
    const filter = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    items
        .filter(i =>
            i.title.toLowerCase().includes(filter) ||
            i.description.toLowerCase().includes(filter)
        )
        .forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            const tags = [];
            if (item.title.match(/ceo/i)) tags.push("CEO");
            if (item.title.match(/cfo/i)) tags.push("CFO");
            if (item.title.match(/merger/i)) tags.push("MERGER");
            if (item.title.match(/resign/i)) tags.push("EXIT");

            div.innerHTML = `
                <div class="title">${item.title}</div>
                <div class="meta">${item.pubDate || ""}</div>
                <div>
                    ${tags.map(t => `<span class="tag">${t}</span>`).join("")}
                </div>
                <p>${item.description?.slice(0, 140) || ""}...</p>
                <a href="${item.link}" target="_blank">Read more →</a>
            `;

            container.appendChild(div);
        });
}

document.getElementById("search").addEventListener("input", () => render(allItems));

loadNews();
setInterval(loadNews, 60000);
</script>

</body>
</html>
